TenantIdHeader:
  name: x-tenant-id
  in: header
  description: Tenant ID for cross-tenant requests (Platform Admin only)
  schema:
    type: string
    format: uuid
  required: false

PageParam:
  name: page
  in: query
  description: Page number (1-indexed)
  schema:
    type: integer
    minimum: 1
    default: 1
  required: false

LimitParam:
  name: limit
  in: query
  description: Items per page
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
  required: false

SortByParam:
  name: sortBy
  in: query
  description: Field to sort by
  schema:
    type: string
  required: false

SortOrderParam:
  name: sortOrder
  in: query
  description: Sort direction
  schema:
    type: string
    enum:
      - asc
      - desc
    default: asc
  required: false

SearchParam:
  name: search
  in: query
  description: Search term for text search
  schema:
    type: string
  required: false

StatusFilterParam:
  name: status
  in: query
  description: Filter by status
  schema:
    type: string
  required: false

AcademicYearIdParam:
  name: academicYearId
  in: query
  description: Filter by academic year
  schema:
    type: string
    format: uuid
  required: false

ClassIdParam:
  name: classId
  in: query
  description: Filter by class
  schema:
    type: string
    format: uuid
  required: false

SectionIdParam:
  name: sectionId
  in: query
  description: Filter by section
  schema:
    type: string
    format: uuid
  required: false

TenantIdParam:
  name: tenantId
  in: query
  description: Filter by tenant (Platform Admin only)
  schema:
    type: string
    format: uuid
  required: false

IdPathParam:
  name: id
  in: path
  required: true
  description: Resource ID
  schema:
    type: string
    format: uuid

ModulePathParam:
  name: module
  in: path
  required: true
  description: Module key
  schema:
    $ref: '../common/schemas.yaml#/ModuleEnum'
